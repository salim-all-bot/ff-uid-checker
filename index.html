<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salim FF UID Checker</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* main card */

.card{

width:90%;
max-width:400px;

background:#111827;
border-radius:15px;

padding:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.5);

}

/* title */

.title{

font-size:22px;
font-weight:bold;
margin-bottom:20px;

}

/* input */

input{

width:80%;
padding:12px;

border:none;

border-radius:8px;

outline:none;

font-size:15px;

}

/* button */

button{

padding:12px 18px;

border:none;

border-radius:8px;

background:#22c55e;

color:white;

font-weight:bold;

cursor:pointer;

margin-left:5px;

}

/* result */

.result{

margin-top:20px;

background:#1e293b;

padding:15px;

border-radius:10px;

font-size:14px;

}

/* footer */

.footer{

margin-top:15px;

font-size:12px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="card">

<div class="title">Free Fire UID Checker</div>

<input id="uid" placeholder="Enter Player UID">

<button onclick="checkUID()">Check</button>

<div id="result" class="result">Player info will appear here</div>

<div class="footer">
Created by <b>Salim Ahmad</b>
</div>

</div>

<script>

async function checkUID(){

let uid=document.getElementById("uid").value;

if(uid==""){
alert("Enter UID");
return;
}

let api="https://bhauxinfo2.vercel.app/bhau?uid="+uid+"&region=BD";

let res=await fetch(api);

let data=await res.json();

let name=data.basicInfo.nickname;

let level=data.basicInfo.level;

let region=data.basicInfo.region;

let likes=data.basicInfo.liked;

document.getElementById("result").innerHTML=

"Name: "+name+"<br>"+
"Level: "+level+"<br>"+
"Region: "+region+"<br>"+
"Likes: "+likes;

}

</script>

</body>
</html>
